<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScholarFeed — 每日學術新聞精選</title>
<!-- SF_VERSION: 20260316-v5 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,400&family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   TOKENS & THEMES
═══════════════════════════════════════════════ */
:root {
  --bg:      #F5F0E8;
  --bg2:     #EDE8DC;
  --bg3:     #E3DDD2;
  --ink:     #111009;
  --ink2:    #2E2A26;
  --ink3:    #5A554F;
  --accent:  #C8380A;
  --accent2: #1B4F8A;
  --gold:    #C9960C;
  --border:  rgba(26,23,20,0.13);
  --serif:   'DM Serif Display', Georgia, serif;
  --fran:    'Fraunces', Georgia, serif;
  --mono:    'DM Mono', 'Courier New', monospace;
  --sans:    system-ui, -apple-system, sans-serif;
  --radius:  2px;
  --bar-h:   4px;
  --top-h:   52px;
  --cat-h:   40px;
}

/* ── Themes ── */
[data-theme="bauhaus"] {
  --bg:#F5F0E8; --bg2:#EDE8DC; --bg3:#E3DDD2;
  --ink:#111009; --ink2:#2E2A26; --ink3:#5A554F;
  --accent:#C8380A; --accent2:#1B4F8A; --gold:#C9960C;
  --border:rgba(26,23,20,0.13);
}
[data-theme="brutalist"] {
  --bg:#FFFFFF; --bg2:#F2F2F2; --bg3:#E5E5E5;
  --ink:#000000; --ink2:#1A1A1A; --ink3:#555555;
  --accent:#FF0000; --accent2:#0000EE; --gold:#CCAA00;
  --border:rgba(0,0,0,0.18);
}
[data-theme="editorial"] {
  --bg:#FAFAF6; --bg2:#F3F3EC; --bg3:#E9E9E0;
  --ink:#111110; --ink2:#2C2C28; --ink3:#585850;
  --accent:#7A1818; --accent2:#2A4A7C; --gold:#9A7400;
  --border:rgba(28,28,26,0.11);
}
[data-theme="mingei"] {
  --bg:#F7F3EC; --bg2:#EEE8DE; --bg3:#E2DAD0;
  --ink:#1A1008; --ink2:#32200E; --ink3:#5A4030;
  --accent:#8A3828; --accent2:#3A6B48; --gold:#B8860B;
  --border:rgba(44,32,24,0.13);
}
[data-theme="deco"] {
  --bg:#FAF6ED; --bg2:#F1EAE0; --bg3:#E5DDD0;
  --ink:#110C02; --ink2:#281C08; --ink3:#4A3A20;
  --accent:#A07010; --accent2:#1A3A5C; --gold:#C8A420;
  --border:rgba(28,20,8,0.13);
}

/* ── Dark mode — 全面黑底白字，覆蓋所有主題 ── */
.dark,
.dark[data-theme="bauhaus"],
.dark[data-theme="brutalist"],
.dark[data-theme="editorial"],
.dark[data-theme="mingei"],
.dark[data-theme="deco"] {
  --bg:#0A0A0A;
  --bg2:#141414;
  --bg3:#1E1E1E;
  --ink:#F0F0F0;
  --ink2:#C0C0C0;
  --ink3:#888888;
  --border:rgba(255,255,255,0.10);
}

/* ═══════════════════════════════════════════════
   BASE RESET
═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  line-height: 1.6;
  transition: background .3s, color .3s;
  min-height: 100vh;
}
button { cursor: pointer; font-family: inherit; }
a { color: inherit; text-decoration: none; }
input { font-family: inherit; }

/* ═══════════════════════════════════════════════
   COLOUR BAR
═══════════════════════════════════════════════ */
.colour-bar {
  height: var(--bar-h);
  background: linear-gradient(to right,
    var(--accent) 0%      33.33%,
    var(--gold)   33.33%  66.66%,
    var(--accent2) 66.66% 100%);
}

/* ═══════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════ */
.topbar {
  height: var(--top-h);
  display: flex;
  align-items: stretch;
  border-bottom: 1.5px solid var(--ink);
  background: var(--bg);
  position: sticky;
  top: var(--bar-h);
  z-index: 100;
}
.tb-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 0 20px;
  border-right: 1.5px solid var(--ink);
  white-space: nowrap;
}
.logo-mark {
  position: relative;
  width: 34px; height: 34px;
  flex-shrink: 0;
}
.logo-mark .sq1 {
  position: absolute; top: 2px; left: 0;
  width: 20px; height: 20px;
  background: var(--ink);
}
.logo-mark .sq2 {
  position: absolute; top: 14px; left: 12px;
  width: 16px; height: 16px;
  background: var(--accent);
}
.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1;
  gap: 2px;
}
.logo-text .lt1 {
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--ink);
}
.logo-text .lt2 {
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--accent);
}
.tb-date {
  display: flex; align-items: center;
  padding: 0 18px;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink3);
  border-right: 1px solid var(--border);
  white-space: nowrap;
}
.tb-themes {
  display: flex; align-items: center; gap: 12px;
  padding: 0 18px;
  flex: 1;
  overflow-x: auto;
  scrollbar-width: none;
}
.tb-themes::-webkit-scrollbar { display: none; }
.theme-lbl {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink3);
  white-space: nowrap;
}
.theme-chips { display: flex; gap: 5px; }
.tchip {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .05em;
  padding: 3px 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--ink2);
  transition: all .15s;
  white-space: nowrap;
}
.tchip:hover { border-color: var(--ink2); color: var(--ink); background: var(--bg2); }
.tchip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.tb-right {
  display: flex; align-items: center; gap: 0;
  border-left: 1.5px solid var(--ink);
  margin-left: auto;
}
.icon-btn {
  width: 44px; height: 100%;
  display: flex; align-items: center; justify-content: center;
  border: none; background: transparent;
  color: var(--ink);
  font-size: 16px;
  border-left: 1px solid var(--border);
  transition: background .15s;
}
.icon-btn:first-child { border-left: none; }
.icon-btn:hover { background: var(--bg2); }

/* ═══════════════════════════════════════════════
   CATEGORY STRIP
═══════════════════════════════════════════════ */
.cat-strip {
  height: var(--cat-h);
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: calc(var(--bar-h) + var(--top-h));
  z-index: 99;
  overflow-x: auto;
  scrollbar-width: none;
}
.cat-strip::-webkit-scrollbar { display: none; }
.citem {
  display: flex; align-items: center;
  padding: 0 18px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink3);
  border-right: 1px solid var(--border);
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
  position: relative;
}
.citem:hover { color: var(--ink); background: var(--bg2); }
.citem.active {
  color: var(--bg);
  background: var(--ink);
}
.citem.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
}
.citem-add { color: var(--accent2); }
.citem-add:hover { color: var(--accent2); }

/* ═══════════════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════════════ */
.layout {
  display: grid;
  grid-template-columns: 1fr 330px;
  min-height: calc(100vh - var(--bar-h) - var(--top-h) - var(--cat-h));
  align-items: start;
}
.main-col {
  border-right: 1px solid var(--border);
}
.side-col {
  position: sticky;
  top: calc(var(--bar-h) + var(--top-h) + var(--cat-h));
  height: calc(100vh - var(--bar-h) - var(--top-h) - var(--cat-h));
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

/* ═══════════════════════════════════════════════
   LOADING STATE
═══════════════════════════════════════════════ */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 40px;
  gap: 20px;
}
.loading-logo {
  position: relative;
  width: 40px; height: 40px;
  animation: pulse-mark 1.4s ease-in-out infinite;
}
.loading-logo .sq1 {
  position: absolute; top: 3px; left: 0;
  width: 26px; height: 26px;
  background: var(--ink);
}
.loading-logo .sq2 {
  position: absolute; top: 18px; left: 16px;
  width: 20px; height: 20px;
  background: var(--accent);
}
@keyframes pulse-mark {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.4; }
}
.loading-title {
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 0.14em;
}
.loading-steps {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 280px;
}
.lstep {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
  opacity: 0;
  transform: translateX(-8px);
  transition: opacity .4s, transform .4s;
}
.lstep.active { opacity: 1; transform: none; color: var(--ink2); }
.lstep.done { opacity: .5; }
.lstep-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  transition: background .3s;
}
.lstep.active .lstep-dot { background: var(--accent); animation: pulse-dot 1s ease infinite; }
.lstep.done .lstep-dot { background: var(--gold); animation: none; }
@keyframes pulse-dot { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5)} }

/* ═══════════════════════════════════════════════
   HERO ARTICLE
═══════════════════════════════════════════════ */
.hero {
  padding: 28px 28px 22px;
  border-bottom: 1px solid var(--border);
  animation: fadeUp .5s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:none; }
}
.hero-eyebrow {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 13px;
  flex-wrap: wrap;
}
.cat-tag {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 3px 8px;
  border: 1px solid currentColor;
}
.hot-tag {
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 2px 7px;
  letter-spacing: .05em;
  animation: blink-border 2s ease infinite;
}
@keyframes blink-border {
  0%,100%{border-color:var(--accent)} 50%{border-color:transparent}
}
.src-tag {
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--ink3);
  margin-left: auto;
}
.hero-title {
  font-family: var(--fran);
  font-size: 29px;
  font-weight: 600;
  line-height: 1.18;
  color: var(--ink);
  margin-bottom: 11px;
  letter-spacing: -.03em;
}
.hero-title em { color: var(--accent); font-style: italic; font-weight: 400; }
.hero-zh {
  font-size: 13px;
  color: var(--ink);
  line-height: 1.65;
  padding-left: 12px;
  border-left: 2.5px solid var(--accent);
  margin-bottom: 16px;
}
.summary-box {
  background: var(--bg2);
  border-left: 3px solid var(--accent2);
  padding: 13px 16px;
  margin-bottom: 14px;
}
.summary-box p {
  font-size: 12.5px;
  line-height: 1.78;
  color: var(--ink);
}
.summary-box strong { color: var(--ink); font-weight: 500; }
.hero-meta {
  display: flex; align-items: center; gap: 7px;
  flex-wrap: wrap;
}
.mpill {
  font-family: var(--mono);
  font-size: 9.5px;
  padding: 2px 8px;
  border: 1px solid var(--border);
  color: var(--ink3);
}
.mpill.ok   { border-color: var(--gold); color: var(--gold); }
.mpill.warn { border-color: var(--accent); color: var(--accent); }
.expand-btn {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .07em;
  padding: 4px 13px;
  background: var(--ink);
  color: var(--bg);
  border: none;
  transition: opacity .15s;
}
.expand-btn:hover { opacity: .75; }
.hero-expanded {
  max-height: 0;
  overflow: hidden;
  transition: max-height .4s ease, padding .3s;
  padding: 0 0;
}
.hero-expanded.open {
  max-height: 600px;
  padding: 18px 0 0;
}
.exp-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin-bottom: 16px;
}
.exp-block { margin-bottom: 14px; }
.exp-lbl {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 5px;
}
.exp-text {
  font-size: 12.5px;
  line-height: 1.75;
  color: var(--ink2);
}
.exp-quote {
  font-family: var(--fran);
  font-style: italic;
  font-size: 13.5px;
  line-height: 1.65;
  color: var(--ink);
  padding: 9px 14px;
  border-left: 2.5px solid var(--accent2);
  background: var(--bg2);
  margin: 6px 0;
}
.doi-link {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--accent2);
  border-bottom: 1px solid var(--accent2);
}

/* ═══════════════════════════════════════════════
   SEARCH TAB
═══════════════════════════════════════════════ */
.search-modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 500;
  align-items: center; justify-content: center;
}
.search-modal-overlay.open { display: flex; }
.search-modal {
  background: var(--bg);
  border: 1.5px solid var(--ink);
  padding: 24px 28px;
  width: 480px; max-width: 90vw;
}
.search-modal-title {
  font-family: var(--bask), 'Libre Baskerville', Georgia, serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: .12em;
  color: var(--ink);
  margin-bottom: 14px;
  text-transform: uppercase;
}
.search-modal-input {
  width: 100%;
  font-family: var(--mono);
  font-size: 13px;
  padding: 10px 12px;
  border: 1px solid var(--ink);
  background: var(--bg2);
  color: var(--ink);
  outline: none;
  margin-bottom: 12px;
}
.search-modal-input:focus { border-color: var(--accent); }
.search-modal-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.search-chip {
  font-family: var(--mono);
  font-size: 9.5px;
  padding: 3px 10px;
  border: 1px solid var(--border);
  color: var(--ink3);
  cursor: pointer;
  background: none;
  letter-spacing: .05em;
  transition: all .12s;
}
.search-chip:hover { border-color: var(--accent); color: var(--accent); }
.search-submit {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .1em;
  padding: 8px 20px;
  background: var(--ink);
  color: var(--bg);
  border: none;
  cursor: pointer;
}
.search-submit:hover { opacity: .8; }
.search-cancel {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .08em;
  padding: 8px 16px;
  background: none;
  color: var(--ink3);
  border: 1px solid var(--border);
  cursor: pointer;
}
.search-loading {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
  margin-top: 8px;
  display: none;
}

/* ═══════════════════════════════════════════════
   FAVOURITE BUTTON
═══════════════════════════════════════════════ */
.fav-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--ink3);
  font-size: 13px;
  width: 28px; height: 28px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: color .15s, border-color .15s, transform .15s;
  line-height: 1;
}
.fav-btn:hover { color: var(--gold); border-color: var(--gold); transform: scale(1.15); }
.fav-btn.active { color: var(--gold); border-color: var(--gold); }
.fav-empty {
  padding: 60px 28px;
  text-align: center;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
  line-height: 2;
}

/* ═══════════════════════════════════════════════
   ARTICLE LIST
═══════════════════════════════════════════════ */
.article-list {}
.article-item {
  display: grid;
  grid-template-columns: 3px 1fr;
  gap: 0 14px;
  padding: 15px 28px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .12s;
  animation: fadeUp .4s ease both;
}
.article-item:nth-child(2) { animation-delay: .05s; }
.article-item:nth-child(3) { animation-delay: .10s; }
.article-item:nth-child(4) { animation-delay: .15s; }
.article-item:nth-child(5) { animation-delay: .20s; }
.article-item:hover { background: var(--bg2); }
.ai-bar { background: var(--border); transition: background .12s; }
.article-item:hover .ai-bar { background: var(--accent2); }
.ai-eyebrow {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 4px;
}
.ai-cat {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.ai-src {
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--ink3);
  margin-left: auto;
}
.ai-title {
  font-family: var(--fran);
  font-size: 16px;
  font-weight: 600;
  line-height: 1.32;
  color: var(--ink);
  margin-bottom: 4px;
  letter-spacing: -.01em;
}
.ai-zh {
  font-size: 11.5px;
  color: var(--ink2);
  line-height: 1.5;
  margin-bottom: 6px;
}
.ai-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.ai-pill {
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 6px;
  border: 1px solid var(--border);
  color: var(--ink3);
}
.ai-pill.hot { border-color: var(--accent); color: var(--accent); }

/* ═══════════════════════════════════════════════
   SIDEBAR — VOCAB
═══════════════════════════════════════════════ */
.side-hd {
  padding: 10px 16px;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink3);
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}
.side-count {
  color: var(--gold);
  font-weight: 500;
}
.vocab-item {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  animation: fadeUp .4s ease both;
}
.vocab-item:nth-child(2) { animation-delay:.08s; }
.vocab-item:nth-child(3) { animation-delay:.16s; }
.vocab-item:nth-child(4) { animation-delay:.24s; }
.v-top {
  display: flex; align-items: baseline; gap: 6px;
  margin-bottom: 5px;
  flex-wrap: wrap;
}
.vword {
  font-family: var(--fran);
  font-size: 15.5px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -.01em;
}
.vpos {
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 5px;
  border: 1px solid var(--border);
  color: var(--ink3);
}
.vlvl {

<body>

<!-- API KEY SETUP OVERLAY -->
<div class="setup-overlay" id="setup-overlay">
  <div class="setup-card" data-theme="bauhaus">
    <div class="setup-header">
      <div class="logo-mark" style="width:28px;height:28px"><div class="sq1" style="width:16px;height:16px;top:2px"></div><div class="sq2" style="width:13px;height:13px;top:11px;left:10px"></div></div>
      <span class="setup-title">ScholarFeed 設定</span>

    <div class="setup-body">
      <p>輸入你的 <strong>Claude API Key</strong> 來啟動每日新聞摘要與英文學習功能。API key 僅存在你的瀏覽器本機，不會上傳任何伺服器。</p>
      <div class="setup-field">

        <input class="setup-input" type="password" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off">
        <div class="setup-hint">
          前往 <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent2);border-bottom:1px solid">console.anthropic.com</a> 取得 API key。
          格式：<code style="font-family:var(--mono);font-size:10px;background:var(--bg3);padding:1px 4px">sk-ant-api03-...</code>
        </div>
      </div>
      <div class="setup-field">
        <label class="setup-label">預設主題</label>
        <select class="setup-input" id="default-theme-select">
          <option value="bauhaus">Bauhaus — 幾何現代</option>
          <option value="editorial">Editorial — 雜誌感</option>

</div>

<!-- MAIN APP -->
<div id="app" data-theme="bauhaus">
  <div class="colour-bar"></div>

  <!-- Topbar -->
  <div class="topbar">
    <div class="tb-logo">
      <div class="logo-mark"><div class="sq1"></div><div class="sq2"></div></div>
      <div class="logo-text"><span class="lt1">SCHOLAR</span><span class="lt2">FEED</span></div>
    </div>
    <div class="tb-date" id="tb-date">— —</div>
    <div class="tb-themes">

        <button class="tchip active" onclick="setTheme('bauhaus',this)">Bauhaus</button>
        <button class="tchip" onclick="setTheme('editorial',this)">Editorial</button>
        <button class="tchip" onclick="setTheme('brutalist',this)">Brutalist</button>
        <button class="tchip" onclick="setTheme('mingei',this)">Mingei</button>

      <button class="icon-btn" onclick="refresh()" title="重新整理">↺</button>
    </div>
  </div>

  <!-- Search Modal -->
  <div class="search-modal-overlay" id="search-overlay">
    <div class="search-modal">
      <div class="search-modal-title">🔍 自訂主題搜尋</div>
      <input class="search-modal-input" id="search-input" type="text"
        placeholder="輸入任何主題，例如：區塊鏈、量子運算、癌症治療..."
        onkeydown="if(event.key==='Enter')doSearch()">
      <div class="search-modal-row">
        <button class="search-chip" onclick="setSearchTopic('區塊鏈與加密貨幣')">區塊鏈</button>
        <button class="search-chip" onclick="setSearchTopic('量子運算')">量子運算</button>
        <button class="search-chip" onclick="setSearchTopic('癌症免疫療法')">癌症治療</button>
        <button class="search-chip" onclick="setSearchTopic('人工智慧監管')">AI 監管</button>
        <button class="search-chip" onclick="setSearchTopic('再生能源')">再生能源</button>
        <button class="search-chip" onclick="setSearchTopic('地緣政治')">地緣政治</button>
        <button class="search-chip" onclick="setSearchTopic('太空探索')">太空探索</button>
        <button class="search-chip" onclick="setSearchTopic('生物科技')">生物科技</button>
      </div>

        <button class="search-submit" onclick="doSearch()">▶ 搜尋新聞</button>
        <button class="search-cancel" onclick="closeSearch()">取消</button>
        <span class="search-loading" id="search-loading">正在搜尋中…</span>
      </div>
    </div>
  </div>

  <!-- Category strip — dynamically rendered by renderCategories() -->

    <div class="citem active" data-cat="all" onclick="filterCat(this)">▲ 精選焦點</div>
    <div class="citem" data-cat="favourites" onclick="filterCat(this)" id="fav-tab">★ 我的最愛</div>
  </div>

  <!-- Layout -->
  <div class="layout">
    <div class="main-col" id="main-col">
      <!-- content injected by JS -->
    </div>
    <div class="side-col" id="side-col">
      <!-- content injected by JS -->
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */
let isDark = false;
let currentCat = 'all';
let articlesData = [];
let categoriesData = [];

let customSearchLabel = '';
let customSearchArticles = [];

function openSearch() {
  const loadEl = document.getElementById('search-loading');
  if (loadEl) { loadEl.style.display = 'none'; loadEl.style.color = 'var(--gold)'; loadEl.textContent = '正在搜尋中…'; }
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(() => document.getElementById('search-input').focus(), 100);
}

function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
}

function setSearchTopic(topic) {
  document.getElementById('search-input').value = topic;
  document.getElementById('search-input').focus();
}

async function doSearch() {
  const topic = document.getElementById('search-input').value.trim();
  if (!topic) return;
  const apiKey = localStorage.getItem('sf_api_key');
  if (!apiKey) return;

  document.getElementById('search-loading').style.display = 'inline';
  document.querySelector('.search-submit').disabled = true;

  try {
    const today = new Date().toLocaleDateString('zh-TW', {year:'numeric',month:'long',day:'numeric'});
    const prompt = '今天是 ' + today + '。請提供關於「' + topic + '」的最新重要新聞，共 10-12 篇。來源必須是具公信力的媒體（BBC、Reuters、NYT、Nature、The Guardian、Wired、Financial Times 等）。對每篇：title（英文）、titleZh（繁體中文）、source、daysAgo（0-7）、hot（true/false）、summary（繁體中文 3 句）、quote（30-50 字英文原句）、discussion（繁體中文 2 句）、pills（2-3 個標籤）、doi、url（真實連結）。只回傳 JSON，從 { 開始：{"articles":[{"id":1,"title":"...","titleZh":"...","category":"custom_search","source":"...","daysAgo":0,"hot":true,"summary":"...","quote":"...","discussion":"...","pills":["..."],"doi":"...","url":"https://..."}]}';

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 4000,
        system: 'JSON generator only. Output pure JSON starting with {. No markdown.',
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error((errData.error?.message || 'API 錯誤') + ' (' + res.status + ')');
    }
    const data = await res.json();
    const raw = data.content?.[0]?.text || '';
    const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
    if (s === -1 || e <= s) throw new Error('回應格式錯誤，請重試');

    // 清理常見的 JSON 破壞字符
    let cleanJson = raw.slice(s, e + 1)

    let parsed;
    try {
      parsed = JSON.parse(cleanJson);
    } catch(jsonErr) {
      // 最後手段：只取 articles 陣列
      const arrMatch = raw.match(/"articles"\s*:\s*\[[\s\S]*?\]\s*}/);
      if (arrMatch) {
        try { parsed = JSON.parse('{' + arrMatch[0]); } catch(e2) { throw new Error('JSON 解析失敗，請重試'); }
      } else {
        throw new Error('JSON 解析失敗，請重試');
      }
    }

    const articles = (parsed.articles || []).map((a, i) => ({
      ...a,
      id: Date.now() + i,
      category: 'custom_search',
      // 清理可能破壞顯示的字符
      title: (a.title || '').replace(/"/g, '\"'),
      summary: (a.summary || ''),
      quote: (a.quote || ''),
    }));

    if (articles.length === 0) throw new Error('找不到相關新聞，請換個主題試試');

    customSearchLabel = topic;
    customSearchArticles = articles;

    // 加入主要資料
    articlesData = articlesData.filter(a => a.category !== 'custom_search').concat(articles);

    closeSearch();
    document.getElementById('search-input').value = '';

    // 切換到搜尋結果 tab
    currentCat = 'custom_search';
    renderCategories();
    renderArticles();

  } catch(err) {
    const loadEl = document.getElementById('search-loading');
    if (loadEl) { loadEl.style.display = 'inline'; loadEl.textContent = '⚠ ' + err.message; loadEl.style.color = 'var(--accent)'; }
  } finally {
    document.getElementById('search-loading').style.display = 'none';
    document.querySelector('.search-submit').disabled = false;
  }
}

function defaultCategories() {
  return [
    {id:'finance',  label:'財經'},
    {id:'politics', label:'政治'},
    {id:'medicine', label:'醫學'},
    {id:'space',    label:'天文'},
    {id:'tech',     label:'科技'},
    {id:'environment', label:'環境'},
  ];
}

// Cat emoji map
const CAT_EMOJI = {
  finance:'💹', politics:'🏛', medicine:'🔬', space:'🔭',
  tech:'⚙️', environment:'🌍', geopolitics:'🌐', ai_policy:'🤖',
  climate_action:'🌱', energy:'⚡', health_policy:'🏥', economics:'📊',
  security:'🔒', diplomacy:'🤝', innovation:'💡', society:'👥',
};

function renderCategories() {
  const strip = document.getElementById('cat-strip');
  const favCount = getFavs().length;
  const searchTab = currentCat === 'custom_search'
    ? `<div class="citem active" data-cat="custom_search">🔍 ${customSearchLabel||'搜尋結果'}</div>`
    : '';
  strip.innerHTML = `
    <div class="citem ${currentCat==='all'?'active':''}" data-cat="all" onclick="filterCat(this)">▲ 精選焦點</div>
    ${categoriesData.map(c => `
      <div class="citem ${currentCat===c.id?'active':''}" data-cat="${c.id}" onclick="filterCat(this)">
        ${CAT_EMOJI[c.id]||'●'} ${c.label}
      </div>`).join('')}
    ${searchTab}
    <div class="citem ${currentCat==='favourites'?'active':''}" data-cat="favourites" onclick="filterCat(this)" id="fav-tab">
      ★ 我的最愛${favCount>0?' ('+favCount+')':''}
    </div>
    <div class="citem" onclick="openSearch()" style="color:var(--accent2);border-left:2px solid var(--accent2)">
      🔍 搜尋主題
    </div>`;
}
let vocabData = [];
let vocabCache = {}; // 每個分類的詞彙快取

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  updateDate();
  const key = localStorage.getItem('sf_api_key');
  const theme = localStorage.getItem('sf_theme') || 'bauhaus';
  const dark = localStorage.getItem('sf_dark') === '1';
  categoriesData = defaultCategories();
  renderCategories();

  setThemeByName(theme);
  if (dark) { isDark = true; document.getElementById('app').classList.add('dark'); }

  if (!key) {
    document.getElementById('setup-overlay').style.display = 'flex';
  } else {
    document.getElementById('setup-overlay').style.display = 'none';
    loadNews();
  }
});

function updateDate() {
  const d = new Date();
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('tb-date').textContent =
    `${days[d.getDay()]} ${String(d.getDate()).padStart(2,'0')}.${months[d.getMonth()]}.${d.getFullYear()} — DAILY EDITION`;
}

/* ════════════════════════════════════════════
   SETUP
════════════════════════════════════════════ */
function saveSetup() {
  let key = document.getElementById('api-key-input').value.trim().replace(/\s/g, '');
  const theme = document.getElementById('default-theme-select').value;
  if (!key || !key.includes('sk-ant')) {
    document.getElementById('api-key-input').style.borderColor = 'var(--accent)';
    document.getElementById('api-key-input').placeholder = '格式應為 sk-ant-api03-... 請重新輸入';
    document.getElementById('api-key-input').value = '';
    return;
  }
  localStorage.setItem('sf_api_key', key);
  localStorage.setItem('sf_theme', theme);
  document.getElementById('setup-overlay').style.display = 'none';
  setThemeByName(theme);
  loadNews();
}

function openSetup() {
  document.getElementById('api-key-input').value = localStorage.getItem('sf_api_key') || '';
  document.getElementById('setup-overlay').style.display = 'flex';
}

/* ════════════════════════════════════════════
   THEME / DARK MODE
════════════════════════════════════════════ */
function setThemeByName(name) {
  document.getElementById('app').setAttribute('data-theme', name);
  document.querySelectorAll('.tchip').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().includes(name) ||
      (name === 'deco' && b.textContent.includes('Déco')) ||
      (name === 'bauhaus' && b.textContent === 'Bauhaus') );
  });
}

function setTheme(name, btn) {
  document.getElementById('app').setAttribute('data-theme', name);
  document.querySelectorAll('.tchip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  localStorage.setItem('sf_theme', name);
}

function toggleDark() {
  isDark = !isDark;
  document.getElementById('app').classList.toggle('dark', isDark);
  localStorage.setItem('sf_dark', isDark ? '1' : '0');
}

/* ════════════════════════════════════════════
   FILTER
════════════════════════════════════════════ */
function filterCat(el) {
  document.querySelectorAll('.citem').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentCat = el.dataset.cat;
  renderArticles();
  refreshVocabForCat(currentCat);
}

async function refreshVocabForCat(cat) {
  // 如果快取有就直接用
  if (vocabCache[cat]) {
    vocabData = vocabCache[cat];
    renderVocab();
    renderEmail();
    return;
  }

  const apiKey = localStorage.getItem('sf_api_key');
  if (!apiKey) return;

  // 取當前分類的文章標題
  let articles;
  if (cat === 'all') {
    articles = articlesData.filter(a => a.hot).slice(0, 6);
  } else if (cat === 'favourites') {
    const favs = getFavs();
    articles = articlesData.filter(a => favs.includes(a.id)).slice(0, 6);
  } else {
    articles = articlesData.filter(a => a.category === cat).slice(0, 6);
  }

  if (!articles.length) return;

  // 顯示 loading
  const sideHd = document.querySelector('.side-hd span');
  if (sideHd) sideHd.textContent = '載入詞彙中…';

  try {
    const catLabel = cat === 'all' ? '精選焦點' : cat === 'favourites' ? '我的最愛' : (categoriesData.find(c=>c.id===cat)?.label || cat);
    const titles = articles.map(a => a.title).join('\n');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1500,
        system: 'JSON generator only. Output pure JSON starting with {. No markdown.',
        messages: [{ role: 'user', content: '從以下「' + catLabel + '」分類的新聞標題中，選出 5 個最值得學習的英文詞彙（B2-C2，偏向該領域專業術語）：\n' + titles + '\n\n只回傳JSON：{"vocab":[{"word":"...","pos":"n. · 領域","level":"C1","def":"一句繁體中文定義","collocations":["...","..."],"example":"...（20-30字）","exampleZh":"...","source":"..."}]}' }]
      })
    });

    if (!res.ok) return;
    const data = await res.json();
    const raw = data.content?.[0]?.text || '';
    const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
    if (s === -1 || e <= s) return;
    const parsed = JSON.parse(raw.slice(s, e + 1));
    const newVocab = parsed.vocab || [];
    if (newVocab.length > 0) {
      vocabCache[cat] = newVocab;
      vocabData = newVocab;
      renderVocab();
      renderEmail();
    }
  } catch(err) { /* silent fail */ }
}

// ── 收藏功能 ──
function getFavs() {
  try { return JSON.parse(localStorage.getItem('sf_favs') || '[]'); } catch(e) { return []; }
}
function isFav(id) { return getFavs().includes(id); }
function toggleFav(e, id) {
  e.stopPropagation();
  let favs = getFavs();
  if (favs.includes(id)) {
    favs = favs.filter(f => f !== id);
  } else {
    favs.push(id);
  }
  localStorage.setItem('sf_favs', JSON.stringify(favs));
  // update fav tab count
  updateFavTab();
  // re-render to update star states
  renderArticles();
}
function updateFavTab() {
  if (categoriesData.length > 0) {
    renderCategories();
  } else {
    const tab = document.getElementById('fav-tab');
    if (!tab) return;
    const count = getFavs().length;
    tab.textContent = count > 0 ? `★ 我的最愛 (${count})` : '★ 我的最愛';
  }
}

/* ════════════════════════════════════════════
   CLAUDE API CALL
════════════════════════════════════════════ */
async function loadNews() {
  const apiKey = localStorage.getItem('sf_api_key');
  if (!apiKey) return;

  const todayKey = new Date().toISOString().slice(0, 10);
  const cached = localStorage.getItem('sf_cache_date');
  if (cached === todayKey) {
    try {
      const d = JSON.parse(localStorage.getItem('sf_cache_data') || '{}');
      if (d.articles?.length > 0) {
        articlesData = d.articles; vocabData = d.vocab || [];
        categoriesData = d.categories || defaultCategories();
        renderCategories(); renderArticles(); renderVocab(); renderEmail();
        return;
      }
    } catch(e) {}
    localStorage.removeItem('sf_cache_date');
    localStorage.removeItem('sf_cache_data');
  }

  const loadInterval = showLoading();

  try {
    const today = new Date().toLocaleDateString('zh-TW', {year:'numeric',month:'long',day:'numeric'});

    // ── 用 Claude web_search 工具直接抓各分類最新新聞 ──
    const CATEGORIES = [
      { id: 'politics',     label: '政治', query: 'world politics news today site:bbc.com OR site:reuters.com OR site:theguardian.com OR site:nytimes.com' },
      { id: 'finance',      label: '財經', query: 'global finance economy news today site:reuters.com OR site:ft.com OR site:bloomberg.com OR site:bbc.com/news/business' },
      { id: 'medicine',     label: '醫學', query: 'medical health research news today site:bbc.com OR site:nytimes.com OR site:nature.com OR site:thelancet.com' },
      { id: 'tech',         label: '科技', query: 'technology AI science news today site:wired.com OR site:arstechnica.com OR site:nytimes.com OR site:theguardian.com' },
      { id: 'space',        label: '天文', query: 'space astronomy NASA news today site:space.com OR site:nasa.gov OR site:nature.com OR site:bbc.com' },
      { id: 'environment',  label: '環境', query: 'climate environment news today site:theguardian.com OR site:bbc.com OR site:nytimes.com' },
    ];

    // 每次呼叫 Claude，要求它用 web_search 搜尋並回傳真實新聞
    async function fetchCategoryNews(cat) {
      const prompt = '今天是 ' + today + '。請搜尋「' + cat.query + '」，找出今日或最近 3 天內最重要的 8 篇新聞。\n\n'
        + '對每篇新聞，請提供：\n'
        + '- title: 英文原標題\n'
        + '- titleZh: 繁體中文翻譯\n'
        + '- source: 媒體來源（BBC/Reuters/NYT 等）\n'
        + '- url: 真實的文章連結\n'
        + '- daysAgo: 0=今天 1=昨天 2=前天\n'
        + '- hot: 是否為重大新聞（true/false）\n'
        + '- summary: 繁體中文 3 句摘要（基於實際內容）\n'
        + '- quote: 文章中的 30-50 字英文原句\n'
        + '- discussion: 繁體中文 2 句分析\n'
        + '- pills: 2-3 個標籤\n'
        + '- doi: 來源 + 日期\n\n'
        + '只回傳 JSON，直接從 { 開始：\n'
        + '{"articles":[{"id":1,"title":"...","titleZh":"...","category":"' + cat.id + '","source":"BBC","daysAgo":0,"hot":true,"summary":"...","quote":"...","discussion":"...","pills":["..."],"doi":"BBC, ' + today + '","url":"https://..."}]}';

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-5',
          max_tokens: 4000,
          system: 'You are a JSON generator. Use your knowledge of recent news to provide accurate, real news articles. Output only pure JSON starting with {. No markdown.',
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const msg = err.error?.message || '';
        if (res.status === 401) throw new Error('KEY_INVALID:' + msg);
        if (res.status === 429) throw new Error('RATE_LIMIT:' + msg);
        throw new Error('HTTP_' + res.status);
      }

      const data = await res.json();
      const raw = data.content?.[0]?.text || '';
      const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
      if (s === -1 || e <= s) return [];
      try {
        const parsed = JSON.parse(raw.slice(s, e + 1));
        return (parsed.articles || []).map(a => ({ ...a, category: cat.id }));
      } catch(e) { return []; }
    }

    // 並行抓所有分類
    const catResults = await Promise.all(CATEGORIES.map(cat => fetchCategoryNews(cat).catch(() => [])));
    clearInterval(loadInterval);

    let allArticles = catResults.flat().map((a, i) => ({ ...a, id: i + 1 }));
    if (allArticles.length === 0) throw new Error('新聞載入失敗，請重試');

    // 詞彙
    async function fetchVocab() {
      const titles = allArticles.slice(0, 6).map(a => a.title).join('\n');
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-5',
          max_tokens: 1500,
          system: 'JSON generator only. Output pure JSON starting with {.',
          messages: [{ role: 'user', content: '從以下標題選 5 個 B2-C2 英文詞彙：\n' + titles + '\n\n只回傳JSON：{"vocab":[{"word":"...","pos":"n. · 財經","level":"C1","def":"一句繁體中文","collocations":["...","..."],"example":"...","exampleZh":"...","source":"..."}]}' }]
        })
      });
      if (!res.ok) return [];
      const data = await res.json();
      const raw = data.content?.[0]?.text || '';
      const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
      if (s === -1 || e <= s) return [];
      try { return JSON.parse(raw.slice(s, e+1)).vocab || []; } catch(e) { return []; }
    }

    const vocab = await fetchVocab().catch(() => []);

    articlesData   = allArticles;
    vocabData      = vocab;
    categoriesData = defaultCategories();

    localStorage.setItem('sf_cache_date', todayKey);
    localStorage.setItem('sf_cache_data', JSON.stringify({ articles: articlesData, vocab: vocabData, categories: categoriesData }));

    renderCategories(); renderArticles(); renderVocab(); renderEmail();

  } catch (e) {
    clearInterval(loadInterval);
    const isRateLimit  = e.message.startsWith('RATE_LIMIT');
    const isKeyInvalid = e.message.startsWith('KEY_INVALID');
    const errDetail    = e.message.includes(':') ? e.message.split(':').slice(1).join(':').trim() : '';
    const title = isKeyInvalid ? 'API Key 無效' : isRateLimit ? '請稍候片刻' : '無法載入今日新聞';
    const body = isKeyInvalid
      ? 'Key 格式或權限有問題，請確認格式為 <code>sk-ant-api03-...</code>'
      : isRateLimit
      ? '<strong>請求被限制（429）</strong><br>' + (errDetail ? '<span style="font-size:11px;color:var(--ink3);font-family:var(--mono)">' + errDetail + '</span><br>' : '') + '<span id="countdown-msg" style="color:var(--gold)">將在 <span id="countdown">60</span> 秒後自動重試…</span>'
      : '錯誤：' + e.message;
    document.getElementById('main-col').innerHTML =
      '<div class="error-box"><h3>' + title + '</h3><p>' + body + '</p>'
      + '<p style="margin-top:8px;font-size:11px;color:var(--ink3)">Key 管理：<a href="https://console.anthropic.com" target="_blank" style="color:var(--accent2)">console.anthropic.com</a></p>'
      + '<div style="margin-top:12px;display:flex;gap:8px">'
      + '<button class="retry-btn" onclick="refresh()">↺ 立即重試</button>'
      + '<button class="retry-btn" style="background:var(--bg2);color:var(--ink);border:1px solid var(--border)" onclick="openSetup()">⚙ 更換 Key</button>'
      + '</div></div>';
    if (isRateLimit) {
      let secs = 60;
      const tick = setInterval(() => {
        secs--;
        const el = document.getElementById('countdown');
        if (el) el.textContent = secs;
        if (secs <= 0) { clearInterval(tick); refresh(); }
      }, 1000);
    }
  }
}
function refresh() { loadNews(); }

      </div>
      <div style="padding:14px 16px 0">
        <p style="font-size:11.5px;color:var(--ink2);line-height:1.6;margin-bottom:10px">
          每天 08:00 自動寄送今日精選摘要與英文詞彙到你的信箱。
        </p>
        <div class="email-row">
          <input class="email-input" type="email" id="email-addr" placeholder="your@email.com">
          <button class="email-submit" onclick="subscribeEmail()">訂閱</button>
        </div>
        <div class="email-success" id="email-success">✓ 設定成功！明天起每天寄送。</div>
        <p style="font-size:10px;color:var(--ink3);margin-top:8px;line-height:1.5">
          需搭配 Zapier 定時任務設定，<a href="README.md" style="color:var(--accent2);border-bottom:1px solid">查看設定說明</a>。
        </p>
      </div>
    </div>`;
}

function subscribeEmail() {
  const email = document.getElementById('email-addr')?.value.trim();
  if (!email || !email.includes('@')) return;
  localStorage.setItem('sf_email', email);
  document.getElementById('email-success').style.display = 'block';
}
</script>
</body>
</html>
